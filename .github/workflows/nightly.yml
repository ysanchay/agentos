name: Nightly Simulation
on:
  schedule:
    - cron: "7 3 * * *"
  workflow_dispatch:

jobs:
  simulation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos_test
          POSTGRES_PASSWORD: agentos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm --filter @agentos/simulation start -- --agents 100 --duration 60000
      - name: Verify simulation results
        run: pnpm --filter @agentos/simulation verify