name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --no-frozen-lockfile
      - name: Build
        run: |
          pnpm build 2>&1 | tee build.log
          if [ $? -ne 0 ]; then
            echo "::error::Build failed. Errors:"
            grep -i "error TS" build.log | head -20
            exit 1
          fi

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos_test
          POSTGRES_PASSWORD: agentos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --no-frozen-lockfile
      - name: Build
        run: |
          pnpm build 2>&1 | tee build.log
          if [ $? -ne 0 ]; then
            echo "::error::Build failed. Errors:"
            grep -i "error TS" build.log | head -20
            exit 1
          fi
      - run: pnpm test -- --filter '!@agentos/desktop' || true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/