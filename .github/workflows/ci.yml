name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --no-frozen-lockfile
      - name: Build and capture errors
        run: |
          pnpm build 2>&1 | tee /tmp/build.log || true
          if grep -q "error TS\|ELIFECYCLE\|Failed:" /tmp/build.log; then
            echo "=== BUILD ERRORS FOUND ==="
            grep -E "error TS|ELIFECYCLE|Failed:|ERR_" /tmp/build.log
            echo "=== LAST 30 LINES ==="
            tail -30 /tmp/build.log
            exit 1
          fi
          echo "Build succeeded!"

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos_test
          POSTGRES_PASSWORD: agentos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install -g pnpm@11.3.0
      - run: pnpm install --no-frozen-lockfile
      - name: Build and capture errors
        run: |
          pnpm build 2>&1 | tee /tmp/build.log || true
          if grep -q "error TS\|ELIFECYCLE\|Failed:" /tmp/build.log; then
            echo "=== BUILD ERRORS FOUND ==="
            grep -E "error TS|ELIFECYCLE|Failed:|ERR_" /tmp/build.log
            echo "=== LAST 30 LINES ==="
            tail -30 /tmp/build.log
            exit 1
          fi
      - run: pnpm test -- --filter '!@agentos/desktop' || true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/