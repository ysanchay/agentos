name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g pnpm@11
      - run: pnpm install --no-frozen-lockfile || (echo "--- INSTALL FAILED, retrying with verbose ---" && pnpm install --no-frozen-lockfile --reporter ndjson 2>&1 | tail -50 && exit 1)
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: agentos_test
          POSTGRES_USER: agentos_test
          POSTGRES_PASSWORD: agentos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm install -g pnpm@11
      - run: pnpm install --no-frozen-lockfile || (echo "--- INSTALL FAILED ---" && pnpm install --no-frozen-lockfile --reporter ndjson 2>&1 | tail -50 && exit 1)
      - run: pnpm build
      - run: pnpm test -- --filter '!@agentos/desktop' || true
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: packages/*/coverage/